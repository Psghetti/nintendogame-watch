# =====================================================================
# Supabase keepalive
#
# Supabase's free tier pauses a project after 7 days of inactivity. The
# site doesn't have enough traffic yet to guarantee that floor, so this
# workflow pings the project's REST endpoint on a schedule — any
# authenticated request counts as activity and resets the inactivity
# timer.
#
# Cron runs every 5 days at 12:00 UTC, which leaves slack for one
# missed/delayed Actions run before the 7-day pause threshold.
# workflow_dispatch is included so the ping can be triggered manually
# from the Actions tab whenever needed.
#
# Requires repo secret: SUPABASE_ANON_KEY (Settings → Secrets and
# variables → Actions). Same anon key that's embedded in index.html.
# =====================================================================

name: Supabase keepalive

on:
  schedule:
    - cron: '0 12 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Sanity-check the secret is actually set (don't print its value).
          if [ -z "$KEY" ]; then
            echo "::error::SUPABASE_ANON_KEY repository secret is empty or unset"
            exit 1
          fi
          echo "Anon key configured: ${#KEY} chars long, prefix '${KEY:0:6}…'"

          # We don't use -f here on purpose. Any HTTP response (200, 401,
          # 404, whatever) means Supabase's gateway logged a request,
          # which is all we need for the inactivity timer to reset. Only
          # actual network/connection failures should fail the step.
          STATUS=$(curl -sS -o /tmp/body -w "%{http_code}" \
            "https://uhnqgivmznafzdhnodpl.supabase.co/rest/v1/" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")
          echo "HTTP status: $STATUS"
          echo "Response body (first 500 bytes):"
          head -c 500 /tmp/body || true
          echo
          case "$STATUS" in
            [1-5][0-9][0-9]) echo "Supabase responded — keepalive ping accepted." ;;
            *) echo "::error::No HTTP response from Supabase"; exit 1 ;;
          esac
